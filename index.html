<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Neardis — Hyperlocal Deal Discovery</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

/* Zinc & Matte Black Monochromatic Theme */
:root {
  --bg: #000000;
  --bg2: #09090b; /* Zinc 950 */
  --surface: #18181b; /* Zinc 900 */
  --surface2: #27272a; /* Zinc 800 */
  --border: #27272a;
  --border2: #3f3f46; /* Zinc 700 */
  --text: #ffffff;
  --text2: #a1a1aa; /* Zinc 400 */
  --text3: #71717a; /* Zinc 500 */
  --accent: #ffffff; 
  --radius: 12px;
  --radius2: 8px;
}

body { font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
.app { display: flex; height: 100vh; overflow: hidden; }

/* SIDEBAR / BOTTOM NAV */
.sidebar { width: 72px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 16px 0; gap: 4px; flex-shrink: 0; z-index: 100; overflow-y: auto; }
.sidebar::-webkit-scrollbar { display: none; }
.logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; color: var(--accent); margin-bottom: 12px; letter-spacing: -1px; cursor: pointer; }
.nav-btn { width: 48px; height: 48px; border: none; background: transparent; border-radius: var(--radius2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: all .2s; color: var(--text3); position: relative; flex-shrink: 0; }
.nav-btn:hover { background: var(--surface); color: var(--text); }
.nav-btn.active { background: var(--surface2); color: var(--accent); }
.nav-sep { width: 32px; height: 1px; background: var(--border); margin: 6px 0; flex-shrink: 0; }
.nav-label { font-size: 9px; color: var(--text3); text-align: center; letter-spacing: .3px; margin-top: -2px; margin-bottom: 4px; }

/* MAIN CONTAINER */
.main { flex: 1; overflow: hidden; display: flex; flex-direction: column; background: var(--bg); }
.page { display: none; flex: 1; overflow: hidden; flex-direction: column; animation: fadeIn .25s ease; }
.page.active { display: flex; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* TOPBAR */
.topbar { display: flex; align-items: center; gap: 10px; padding: 10px 16px; background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0; min-height: 52px; }
.topbar-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 17px; white-space: nowrap; }
.search-bar { flex: 1; max-width: 320px; display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 7px 14px; }
.search-bar input { background: none; border: none; outline: none; color: var(--text); font-family: inherit; font-size: 13px; flex: 1; min-width: 0; }
.search-bar input::placeholder { color: var(--text3); }

/* BUTTONS */
.btn { padding: 7px 14px; border-radius: var(--radius2); border: none; cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 600; transition: all .2s; white-space: nowrap; }
.btn-primary { background: var(--accent); color: var(--bg); }
.btn-primary:hover { opacity: .9; transform: translateY(-1px); }
.btn-ghost { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--surface2); }
.btn-sm { padding: 5px 10px; font-size: 11px; }

.avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; color: var(--accent); flex-shrink: 0; cursor: pointer; }

/* FEED & CARDS */
.scroll { overflow-y: auto; flex: 1; padding: 16px; }
.deal-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
.deal-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: all .2s; position: relative; }
.deal-card:hover { border-color: var(--border2); transform: translateY(-2px); }
.deal-img { width: 100%; height: 130px; display: flex; align-items: center; justify-content: center; font-size: 44px; background: var(--surface); position: relative; }
.deal-badge { position: absolute; top: 8px; right: 8px; background: var(--bg); color: var(--accent); border: 1px solid var(--border); font-weight: 700; font-size: 12px; padding: 3px 8px; border-radius: 5px; }
.deal-body { padding: 12px; }
.deal-shop { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 3px; }
.deal-title { font-size: 13px; font-weight: 600; margin-bottom: 7px; line-height: 1.3; }

/* RESPONSIVE DESIGN: MOBILE */
@media (max-width: 768px) {
  .app { flex-direction: column-reverse; }
  .sidebar { width: 100%; height: 65px; flex-direction: row; justify-content: space-around; padding: 0 10px; border-right: none; border-top: 1px solid var(--border); overflow-y: visible; }
  .logo, .nav-sep, .nav-label { display: none; }
  .nav-btn { width: flex; flex: 1; height: 100%; border-radius: 0; }
  .topbar { padding: 10px; }
  .search-bar { max-width: none; }
}
</style>
</head>
<body>
<div class="app">

<div class="sidebar">
  <div class="logo">N</div>
  <button class="nav-btn active" onclick="showPage('feed')" title="Feed">📍</button>
  <div class="nav-label">Feed</div>
  <button class="nav-btn" onclick="showPage('map')" title="Map">🗺️</button>
  <div class="nav-label">Map</div>
  <button class="nav-btn" onclick="showPage('bookmarks')" title="Saved">🔖</button>
  <div class="nav-label">Saved</div>
  <button class="nav-btn" onclick="showPage('profile')" title="Profile">👤</button>
  <div class="nav-label">Profile</div>
</div>

<div class="main">

<div class="page active" id="page-feed">
  <div class="topbar">
    <div class="topbar-title">Neardis</div>
    <div class="search-bar">
      <span>🔍</span>
      <input type="text" placeholder="Search deals near you..." id="search-input">
    </div>
    <div class="avatar" onclick="showPage('profile')">SM</div>
  </div>
  <div class="scroll">
    <div class="deal-grid" id="deal-grid">
      <div style="grid-column: 1/-1; text-align: center; color: var(--text3); padding: 40px;">
        Connecting to GitHub Database...
      </div>
    </div>
  </div>
</div>

<div class="page" id="page-map"><div class="topbar"><div class="topbar-title">Map</div></div><div class="scroll">Map View Under Construction</div></div>
<div class="page" id="page-bookmarks"><div class="topbar"><div class="topbar-title">Saved</div></div><div class="scroll">Bookmarks View Under Construction</div></div>
<div class="page" id="page-profile"><div class="topbar"><div class="topbar-title">Profile</div></div><div class="scroll">Profile View Under Construction</div></div>

</div>
</div>

<script>
// --- CORE APPLICATION LOGIC ---

// URL to your raw JSON file hosted on GitHub
// Format: https://raw.githubusercontent.com/[USERNAME]/[REPO]/main/[FILE].json
const GITHUB_DATA_URL = 'https://raw.githubusercontent.com/username/repo/main/neardis-deals.json'; 
let DEALS_DATABASE = [];

// Navigation Logic
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  
  const navBtns = document.querySelectorAll('.nav-btn');
  navBtns.forEach(b => b.classList.remove('active'));
  
  // Basic mapping to keep active states in sync
  const pageMap = { 'feed': 0, 'map': 1, 'bookmarks': 2, 'profile': 3 };
  if(navBtns[pageMap[id]]) navBtns[pageMap[id]].classList.add('active');
}

// Fetch live data from GitHub
async function initializeApp() {
  try {
    const response = await fetch(GITHUB_DATA_URL);
    if (!response.ok) throw new Error('Network response was not ok');
    
    DEALS_DATABASE = await response.json();
    renderFeed();
  } catch (error) {
    console.error("Data Fetch Error: ", error);
    document.getElementById('deal-grid').innerHTML = `
      <div style="grid-column: 1/-1; text-align: center; color: var(--text3); padding: 40px;">
        ⚠️ Failed to load deals from GitHub. Please ensure the repository is public and the Raw URL is correct.
      </div>
    `;
  }
}

// Render the UI with GitHub data
function renderFeed() {
  const grid = document.getElementById('deal-grid');
  if (DEALS_DATABASE.length === 0) {
    grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--text3); padding: 40px;">No deals currently active.</div>';
    return;
  }

  grid.innerHTML = DEALS_DATABASE.map(d => `
    <div class="deal-card">
      <div class="deal-img">${d.emoji || '🏬'}<div class="deal-badge">-${d.discount}%</div></div>
      <div class="deal-body">
        <div class="deal-shop">${d.shopName}</div>
        <div class="deal-title">${d.title}</div>
      </div>
    </div>
  `).join('');
}

// Boot the application
window.onload = initializeApp;
</script>
</body>
</html>
